function lsGet(k,d){try{const r=localStorage.getItem(k);return r?JSON.parse(r):d}catch{return d}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
const LS_ME="ex_me_v5";
const QUOTA=22;

function parseDateToNumber(s){const m=s.match(/(\d+)월\s*(\d+)일/);if(!m)return 0;return 2026*10000+parseInt(m[1])*100+parseInt(m[2]);}
function sortSchedsByDate(arr){return[...arr].sort((a,b)=>parseDateToNumber(a.date)-parseDateToNumber(b.date));}
function schedStrToDate(s){const m=s.match(/(\d+)월\s*(\d+)일/);if(!m)return null;return new Date(2026,parseInt(m[1])-1,parseInt(m[2]));}
function wmoToIcon(c){if(c===0)return{icon:"☀️",desc:"맑음"};if(c<=2)return{icon:"🌤️",desc:"구름조금"};if(c<=3)return{icon:"☁️",desc:"흐림"};if(c<=49)return{icon:"🌫️",desc:"안개"};if(c<=59)return{icon:"🌦️",desc:"이슬비"};if(c<=69)return{icon:"🌧️",desc:"비"};if(c<=79)return{icon:"🌨️",desc:"눈"};if(c<=84)return{icon:"🌧️",desc:"소나기"};return{icon:"⛈️",desc:"뇌우"};}

function exportTxt(sched,yesMembers){
  const sorted=[...yesMembers].sort((a,b)=>Number(b.rank||0)-Number(a.rank||0));
  const lines=["========================================","  영외체련 참석 인원 명단","========================================","  일정: "+sched.date,"  종목: "+sched.event,"  총 인원: "+sorted.length+"명","----------------------------------------","  순번  기수   이름","----------------------------------------",...sorted.map((m,i)=>"  "+(i+1)+"      "+m.rank+"기    "+m.name),"----------------------------------------"];
  const blob=new Blob([lines.join("\r\n")],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="영외체련_"+sched.date.replace(/[\s()]/g,"")+"_참석명단.txt";a.click();
  URL.revokeObjectURL(url);
}

function useWeather(){
  const [weather,setWeather]=useState({});
  useEffect(()=>{
    fetch("https://api.open-meteo.com/v1/forecast?latitude="+WEATHER_LAT+"&longitude="+WEATHER_LON+"&daily=weathercode,temperature_2m_max,precipitation_probability_max&timezone=Asia%2FSeoul&forecast_days=14")
      .then(r=>r.json()).then(data=>{
        const map={};
        (data.daily.time||[]).forEach((date,i)=>{map[date]={temp:data.daily.temperature_2m_max[i],precip:data.daily.precipitation_probability_max[i],wmo:data.daily.weathercode[i]};});
        setWeather(map);
      }).catch(()=>{});
  },[]);
  return weather;
}

function BarChart({data,maxVal,sel,onSel}){
  const W=340,H=160,PL=28,PB=24,PT=10,PR=10,cW=W-PL-PR,cH=H-PB-PT;
  const n=data.length,gW=cW/n,bW=Math.min(gW*0.28,22);
  const ys=v=>cH-(v/Math.max(maxVal,1))*cH;
  const ticks=[0,Math.ceil(maxVal/2),maxVal].filter((v,i,a)=>a.indexOf(v)===i);
  return h("svg",{viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:"auto"}},
    ticks.map(v=>h("g",{key:v},h("line",{x1:PL,x2:W-PR,y1:PT+ys(v),y2:PT+ys(v),stroke:"rgba(0,0,0,0.06)",strokeWidth:1}),h("text",{x:PL-4,y:PT+ys(v)+4,textAnchor:"end",fontSize:10,fill:"#bbb"},v))),
    data.map((d,i)=>{
      const full=d.yes>=QUOTA,cx=PL+gW*i+gW/2,isSel=sel===d.id;
      return h("g",{key:d.id,onClick:()=>onSel(d.id),style:{cursor:"pointer"}},
        isSel&&h("rect",{x:PL+gW*i+2,y:PT,width:gW-4,height:cH,fill:"rgba(49,130,246,0.07)",rx:6}),
        h("rect",{x:cx-bW-2,y:PT+ys(d.yes),width:bW,height:Math.max((d.yes/Math.max(maxVal,1))*cH,2),fill:full?"#3182f6":"#00b074",rx:4}),
        h("rect",{x:cx+2,y:PT+ys(d.no),width:bW,height:Math.max((d.no/Math.max(maxVal,1))*cH,2),fill:"#f45452",rx:4}),
        h("text",{x:cx,y:H-8,textAnchor:"middle",fontSize:10,fill:isSel?"#3182f6":"#bbb",fontWeight:isSel?"700":"400"},d.label)
      );
    })
  );
}

/* ════════════════════════════════════════
   설문조사 화면
════════════════════════════════════════ */
function SurveyPage({me,isAdmin,onBack,setAView,setAOpen}){
  const [survey,setSurvey]=useState(null);   // {title, items: {id:{text,votes:{uid:true}}}}
  const [newItem,setNewItem]=useState("");
  const [adding,setAdding]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>{
    db.ref("survey").on("value",snap=>{setSurvey(snap.val()||{title:"",items:{}});});
    return()=>db.ref("survey").off();
  },[]);

  const items=survey?Object.entries(survey.items||{}).map(([id,v])=>({id,...v})):[];
  const myVote=items.find(it=>it.votes&&it.votes[me.id]);
  const total=items.reduce((s,it)=>s+Object.keys(it.votes||{}).length,0);

  const addItem=()=>{
    const t=newItem.trim();
    if(!t){setErr("항목을 입력해 주세요.");return;}
    if(items.find(it=>it.text===t)){setErr("이미 있는 항목이에요.");return;}
    const id="i"+Date.now();
    db.ref("survey/items/"+id).set({text:t,votes:{}});
    setNewItem(""); setAdding(false); setErr("");
  };

  const vote=(itemId)=>{
    if(myVote){
      if(myVote.id===itemId) return; // 같은 항목 재클릭 무시
      // 기존 투표 취소 후 새 투표
      db.ref("survey/items/"+myVote.id+"/votes/"+me.id).remove();
    }
    db.ref("survey/items/"+itemId+"/votes/"+me.id).set(true);
  };

  const deleteItem=(itemId)=>{
    if(!isAdmin)return;
    db.ref("survey/items/"+itemId).remove();
  };

  const BB={padding:"10px 0",borderRadius:12,border:"none",background:"#3182f6",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"};
  const BG={padding:"10px 0",borderRadius:12,border:"1px solid rgba(0,0,0,0.1)",background:"#f5f6f8",color:"#555",fontSize:14,fontWeight:600,cursor:"pointer"};

  return h("div",{style:{padding:"1.5rem 1.25rem",maxWidth:640,margin:"0 auto"}},
    /* 헤더 */
    h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:"1.5rem"}},
      h("button",{onClick:onBack,style:{padding:"6px 14px",fontSize:13,fontWeight:600,borderRadius:10,background:"#f5f6f8",border:"1px solid rgba(0,0,0,0.1)",cursor:"pointer",color:"#555"}},"← 홈"),
      h("div",null,
        h("h1",{style:{fontSize:20,fontWeight:700}},(survey&&survey.title)||"설문조사"),
        h("p",{style:{fontSize:13,color:"#888",marginTop:2}},"항목을 추가하거나 원하는 항목에 투표하세요")
      )
    ),

    /* 관리자: 제목 설정 안내 */
    isAdmin&&h("div",{className:"card",style:{marginBottom:12}},
      h("p",{style:{fontSize:13,color:"#888",marginBottom:8}},"설문조사 제목과 항목은 관리자 모드에서 관리할 수 있어요."),
      h("button",{onClick:()=>{setAOpen(true);setAView("survey");},style:Object.assign({},BB,{width:"100%",padding:"10px 0"})},"관리자 모드에서 설문 관리")
    ),

    /* 항목 추가 */
    h("div",{className:"card"},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
        h("p",{style:{fontSize:15,fontWeight:700}},survey&&survey.title?"설문 항목":"항목 목록"),
        h("button",{onClick:()=>{setAdding(p=>!p);setErr("");setNewItem("");},
          style:{padding:"6px 14px",fontSize:13,fontWeight:600,borderRadius:10,background:adding?"#f5f6f8":"#3182f6",color:adding?"#555":"#fff",border:adding?"1px solid rgba(0,0,0,0.1)":"none",cursor:"pointer"}},
          adding?"취소":"+ 항목 추가")
      ),

      adding&&h("div",{style:{marginBottom:14}},
        h("div",{style:{display:"flex",gap:8}},
          h("input",{className:"inp",placeholder:"항목 이름 입력",value:newItem,
            onChange:ev=>setNewItem(ev.target.value),
            onKeyDown:ev=>ev.key==="Enter"&&addItem(),
            style:{flex:1}}),
          h("button",{onClick:addItem,style:{padding:"10px 16px",borderRadius:12,border:"none",background:"#3182f6",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}},"추가")
        ),
        err&&h("p",{style:{fontSize:13,color:"#f45452",marginTop:6}},err)
      ),

      items.length===0
        ? h("p",{style:{fontSize:13,color:"#bbb",textAlign:"center",padding:"1.5rem 0"}},"아직 항목이 없어요. 첫 번째 항목을 추가해 보세요!")
        : h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
            [...items].sort((a,b)=>Object.keys(b.votes||{}).length-Object.keys(a.votes||{}).length).map(it=>{
              const cnt=Object.keys(it.votes||{}).length;
              const isMyVote=myVote&&myVote.id===it.id;
              const pct=total>0?Math.round(cnt/total*100):0;
              return h("div",{key:it.id,style:{borderRadius:14,border:"2px solid "+(isMyVote?"#3182f6":"rgba(0,0,0,0.07)"),background:isMyVote?"#f0f7ff":"#fff",overflow:"hidden",cursor:"pointer"},
                onClick:()=>vote(it.id)},
                h("div",{style:{padding:"12px 16px"}},
                  h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
                    h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                      isMyVote&&h("span",{style:{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10,background:"#3182f6",color:"#fff"}},"내 투표"),
                      h("span",{style:{fontSize:14,fontWeight:600}},it.text)
                    ),
                    h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                      h("span",{style:{fontSize:13,fontWeight:700,color:"#3182f6"}},cnt+"표"),
                      isAdmin&&h("button",{onClick:e=>{e.stopPropagation();deleteItem(it.id);},
                        style:{padding:"3px 10px",fontSize:12,borderRadius:8,border:"none",background:"#fff0f0",color:"#f45452",cursor:"pointer",fontWeight:600}},"삭제")
                    )
                  ),
                  /* 진행바 */
                  h("div",{style:{background:"#eef0f3",borderRadius:99,height:6,overflow:"hidden"}},
                    h("div",{style:{height:"100%",borderRadius:99,background:isMyVote?"#3182f6":"#00b074",width:pct+"%",transition:"width 0.3s"}})
                  ),
                  h("p",{style:{fontSize:11,color:"#aaa",marginTop:4}},pct+"%")
                )
              );
            })
          )
    ),
    /* 총 투표 수 */
    items.length>0&&h("p",{style:{fontSize:12,color:"#aaa",textAlign:"center",marginTop:8}},"총 "+total+"표 · 항목을 클릭해 투표하세요 (변경 가능)")
  );
}

/* ════════════════════════════════════════

function App(){
  const [ready,setReady]        =useState(false);
  const [dbErr,setDbErr]        =useState("");
  const [scheds,setScheds]      =useState(DEF_SCHEDS);
  const [roster,setRoster]      =useState([]);
  const [votes,setVotes]        =useState({});
  const [me,setMe]              =useState(()=>lsGet(LS_ME,null));
  const [step,setStep]          =useState(()=>lsGet(LS_ME,null)?"home":"reg");
  // step: reg | login | pending | home | exercise | survey
  const [page,setPage]          =useState("home"); // home | exercise | survey
  const [form,setForm]          =useState({rank:"",serial:"",name:""});
  const [authErr,setAuthErr]    =useState("");
  const [tab,setTab]            =useState("vote");
  const [dTab,setDTab]          =useState(null);
  const [isAdmin,setIsAdmin]    =useState(false);
  const [aOpen,setAOpen]        =useState(false);
  const [adminEmail,setAdminEmail]=useState("");
  const [adminPw,setAdminPw]    =useState("");
  const [adminErr,setAdminErr]  =useState("");
  const [eScheds,setEScheds]    =useState([]);
  const [aView,setAView]        =useState("schedules");
  // 설문조사 관리
  const [surveyTitle,setSurveyTitle]=useState("");
  const weather=useWeather();

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(user=>setIsAdmin(!!(user&&user.uid===ADMIN_UID)));
    return()=>unsub();
  },[]);

  useEffect(()=>{
    const tid=setTimeout(()=>setDbErr("Firebase 연결 실패.\ndatabaseURL을 확인해 주세요:\n"+firebaseConfig.databaseURL),10000);
    db.ref("scheds").on("value",snap=>{const v=snap.val();if(v)setScheds(Object.values(v));else db.ref("scheds").set(Object.fromEntries(DEF_SCHEDS.map(s=>[s.id,s])));setReady(true);clearTimeout(tid);},err=>{setDbErr("오류: "+err.message);clearTimeout(tid);});
    db.ref("roster").on("value",snap=>{const v=snap.val();setRoster(v?Object.values(v):[]);});
    db.ref("votes").on("value",snap=>{setVotes(snap.val()||{});});
    return()=>{db.ref("scheds").off();db.ref("roster").off();db.ref("votes").off();};
  },[]);

  useEffect(()=>lsSet(LS_ME,me),[me]);

  const approvedRoster=roster.filter(r=>r.approved===true);
  const pendingRoster =roster.filter(r=>!r.approved);

  /* 등록 */
  const doRegister=async()=>{
    const {rank,serial,name}=form;
    if(!rank.trim()||!serial.trim()||!name.trim()){setAuthErr("모든 항목을 입력해 주세요.");return;}
    if(!/^[가-힣\s]{1,10}$/.test(name.trim())){setAuthErr("이름은 한글로 입력해 주세요.");return;}
    if(roster.find(r=>r.rank===rank.trim()&&r.name===name.trim())){setAuthErr("이미 등록된 이름입니다.\n본인이라면 '본인 확인'으로 로그인해 주세요.");return;}
    const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(serial.trim()));
    const serialHash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    db.ref("roster/"+Date.now()).set({id:Date.now(),rank:rank.trim(),serialHash,name:name.trim(),approved:false});
    setAuthErr(""); setStep("pending");
  };

  /* 로그인 */
  const doLogin=async()=>{
    const {rank,serial,name}=form;
    if(!rank.trim()||!serial.trim()||!name.trim()){setAuthErr("모든 항목을 입력해 주세요.");return;}
    const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(serial.trim()));
    const serialHash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    const matched=roster.find(r=>r.rank===rank.trim()&&r.name===name.trim()&&r.serialHash===serialHash);
    if(!matched){setAuthErr("등록된 정보와 일치하지 않습니다.");return;}
    if(!matched.approved){setAuthErr("관리자 승인 대기 중입니다.\n잠시 후 다시 시도해 주세요.");return;}
    setMe({...matched,serial:serial.trim()});
    setAuthErr(""); setStep("home"); setPage("home");
  };

  /* 관리자 */
  const doAdminLogin=async()=>{
    setAdminErr("");
    try{
      const cred=await auth.signInWithEmailAndPassword(adminEmail,adminPw);
      if(cred.user.uid!==ADMIN_UID){await auth.signOut();setAdminErr("관리자 계정이 아닙니다.");return;}
      setEScheds(scheds.map(s=>Object.assign({},s)));
      // 설문 제목 불러오기
      db.ref("survey/title").once("value").then(snap=>setSurveyTitle(snap.val()||""));
    }catch(e){setAdminErr("로그인 실패: "+e.message);}
  };
  const doAdminLogout=()=>{auth.signOut();setAOpen(false);};

  /* 투표 */
  const castVote=(sid,val)=>{
    if(!me)return;
    const s=scheds.find(x=>x.id===sid);
    if(s&&s.closed)return;
    db.ref("votes/"+sid+"/"+me.id).set(val);
  };
  const getSchedVotes=(sid)=>{
    const num=String(sid).replace(/[^0-9]/g,"");
    const merged={};
    Object.keys(votes).forEach(k=>{if(String(k).replace(/[^0-9]/g,"")===num)Object.assign(merged,votes[k]);});
    return merged;
  };
  const getVote=sid=>{const sv=getSchedVotes(sid);const uid=me&&me.id;return sv[uid]||sv[String(uid)]||null;};

  const sortedScheds=sortSchedsByDate(scheds);
  const stats=sortedScheds.map(s=>{
    const sv=getSchedVotes(s.id);
    const yes=approvedRoster.filter(m=>sv[m.id]==="yes"||sv[String(m.id)]==="yes").length;
    const no =approvedRoster.filter(m=>sv[m.id]==="no" ||sv[String(m.id)]==="no" ).length;
    const full=yes>=QUOTA,need=Math.max(QUOTA-yes,0);
    return{id:s.id,label:s.date.slice(0,5),yes,no,full,need};
  });
  const maxVal=Math.max(approvedRoster.length,1);
  const avg=approvedRoster.length?Math.round(stats.reduce((a,s)=>a+s.yes,0)/Math.max(scheds.length,1)):0;
  const safeTab=scheds.find(s=>s.id===dTab)?dTab:(sortedScheds[0]&&sortedScheds[0].id)||null;
  const selStat=stats.find(s=>s.id===safeTab)||null;

  const schedToWeatherKey=(ds)=>{const d=schedStrToDate(ds);if(!d)return null;return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
  const isWithin14Days=(ds)=>{const d=schedStrToDate(ds);if(!d)return false;const t=new Date();t.setHours(0,0,0,0);const diff=(d-t)/86400000;return diff>=0&&diff<=14;};

  const saveA=()=>{
    const ns=eScheds.filter(s=>s.date.trim());

              ),
              h("button",{onClick:()=>setEScheds(p=>[...p,{id:"s"+Date.now(),date:"",event:"",closed:false}]),style:{width:"100%",padding:"10px 0",borderRadius:12,border:"1.5px dashed #c0c8d8",background:"transparent",color:"#3182f6",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:10}},"+ 일정 추가"),
              h("div",{style:{display:"flex",gap:8}},
                h("button",{onClick:()=>setAOpen(false),style:Object.assign({},BG,{flex:1})},"취소"),
                h("button",{onClick:saveA,style:Object.assign({},BB,{flex:1})},"저장")
              )
            ),

            /* 투표 마감 */
            aView==="votes"&&h("div",null,
              h("p",{style:{marginBottom:12,fontSize:13,color:"#888"}},"마감 시 참석 명단 txt 파일이 저장됩니다"),
              h("div",{style:{display:"flex",flexDirection:"column",gap:8,marginBottom:16}},
                sortedScheds.map(s=>{
                  const sv=getSchedVotes(s.id);
                  const yesCnt=approvedRoster.filter(m=>sv[m.id]==="yes"||sv[String(m.id)]==="yes").length;
                  return h("div",{key:s.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:"#f5f6f8",borderRadius:14}},
                    h("div",null,h("p",{style:{fontSize:14,fontWeight:600}},s.date||"날짜 미설정"),h("p",{style:{marginTop:2,fontSize:12,color:"#888"}},(s.event||"종목 미설정")+" · 참석 "+yesCnt+"명")),
                    h("button",{onClick:()=>handleClose(s),style:{padding:"7px 14px",fontSize:13,fontWeight:600,borderRadius:10,border:"none",cursor:"pointer",background:s.closed?"#e6faf3":"#fff0f0",color:s.closed?"#00805a":"#f45452"}},s.closed?"열기":"마감")
                  );
                })
              ),
              h("button",{onClick:()=>setAOpen(false),style:Object.assign({},BG,{width:"100%"})},"닫기")
            ),

            /* 설문 관리 */
            aView==="survey"&&h("div",null,
              h("p",{style:{fontSize:13,color:"#888",marginBottom:12}},"설문조사 제목을 설정하고 항목을 초기화할 수 있어요"),
              h("label",{style:{fontSize:12,fontWeight:600,color:"#888",display:"block",marginBottom:6}},"설문조사 제목"),
              h("input",{className:"inp",placeholder:"예) 스포츠용품 설문조사",value:surveyTitle,onChange:ev=>setSurveyTitle(ev.target.value),style:{marginBottom:10}}),
              h("div",{style:{display:"flex",gap:8,marginBottom:16}},
                h("button",{onClick:saveSurveyTitle,style:Object.assign({},BB,{flex:1})},"제목 저장"),
                h("button",{onClick:clearSurveyItems,style:{flex:1,padding:"12px 0",borderRadius:12,border:"none",background:"#fff0f0",color:"#f45452",fontSize:14,fontWeight:700,cursor:"pointer"}},"항목 초기화")
              ),
              h("button",{onClick:()=>setAOpen(false),style:Object.assign({},BG,{width:"100%"})},"닫기")
            ),

            /* 가입 승인 */
            aView==="pending"&&h("div",null,
              pendingRoster.length===0
                ?h("p",{style:{fontSize:13,color:"#bbb",textAlign:"center",padding:"1.5rem 0"}},"대기 중인 가입 신청이 없습니다")
                :h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
                    pendingRoster.map(m=>h("div",{key:m.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:"#f5f6f8",borderRadius:14}},
                      h("div",null,h("p",{style:{fontSize:14,fontWeight:600}},m.name),h("p",{style:{fontSize:12,color:"#888",marginTop:2}},m.rank+"기")),
                      h("div",{style:{display:"flex",gap:6}},
                        h("button",{onClick:()=>approveUser(m),style:{padding:"6px 14px",fontSize:13,fontWeight:600,borderRadius:10,border:"none",cursor:"pointer",background:"#e6faf3",color:"#00805a"}},"승인"),
                        h("button",{onClick:()=>rejectUser(m),style:{padding:"6px 14px",fontSize:13,fontWeight:600,borderRadius:10,border:"none",cursor:"pointer",background:"#fff0f0",color:"#f45452"}},"거절")
                      )
                    ))
                  ),
              h("div",{style:{marginTop:16}},h("button",{onClick:()=>setAOpen(false),style:Object.assign({},BG,{width:"100%"})},"닫기"))
            )
          )
    )
  );

  return h("div",null,
    page==="home"?homePage:exercisePage,
    adminModal
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
