<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>영외체련 인원조사</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6f8;color:#191919;min-height:100vh}
input,select,button{font-family:inherit}
.card{background:#fff;border-radius:20px;border:1px solid rgba(0,0,0,0.07);padding:20px;margin-bottom:12px}
.inp{width:100%;padding:10px 14px;font-size:14px;border-radius:12px;border:1.5px solid rgba(0,0,0,0.12);background:#fff;color:#191919;outline:none}
.inp:focus{border-color:#3182f6}
.inp:disabled{background:#f5f6f8;color:#999}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.mbox{background:#fff;border-radius:24px;padding:28px 24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
</style>
</head>
<body>
<div id="root"><p style="text-align:center;padding:4rem;color:#aaa;font-size:15px">불러오는 중...</p></div>

<!-- 1. React -->
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<!-- 2. Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCt5pNuKsXH7K_VuZTlSKQ2qI8cSFkrRdk",
  authDomain: "outward-exercise-e35c1.firebaseapp.com",
  databaseURL: "https://outward-exercise-e35c1-default-rtdb.firebaseio.com",
  projectId: "outward-exercise-e35c1",
  storageBucket: "outward-exercise-e35c1.firebasestorage.app",
  messagingSenderId: "919136835385",
  appId: "1:919136835385:web:ceca85d8c790f77d08fae8"
};

const ADMIN_PW_HASH = "91b1e240ed103f291c16765cb201a9e4f2c23ff4057050b9fd78571f373ace3d";

const DEF_SCHEDS = [
  {id:1,date:"3월 20일 (금)",event:"축구",closed:false},
  {id:2,date:"4월 3일 (금)",event:"축구",closed:false},
  {id:3,date:"4월 17일 (금)",event:"배구",closed:false},
  {id:4,date:"5월 1일 (금)",event:"축구",closed:false},
  {id:5,date:"5월 15일 (금)",event:"족구",closed:false},
];

async function sha256(str){
  const buf = await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function lsGet(k,d){try{const r=localStorage.getItem(k);return r?JSON.parse(r):d}catch{return d}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

const LS_ME = "ex_me_v5";

/* Firebase 초기화 */
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const {useState,useEffect} = React;
const h = React.createElement;

/* ── SVG 차트 ── */
function BarChart({data,maxVal,scheds,sel,onSel}){
  const W=340,H=160,PL=28,PB=24,PT=10,PR=10,cW=W-PL-PR,cH=H-PB-PT;
  const n=data.length,gW=cW/n,bW=Math.min(gW*0.28,22);
  const ys=v=>cH-(v/Math.max(maxVal,1))*cH;
  const ticks=[0,Math.ceil(maxVal/2),maxVal].filter((v,i,a)=>a.indexOf(v)===i);
  return h("svg",{viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:"auto"}},
    ticks.map(v=>h("g",{key:v},
      h("line",{x1:PL,x2:W-PR,y1:PT+ys(v),y2:PT+ys(v),stroke:"rgba(0,0,0,0.06)",strokeWidth:1}),
      h("text",{x:PL-4,y:PT+ys(v)+4,textAnchor:"end",fontSize:10,fill:"#bbb"},v)
    )),
    data.map((d,i)=>{
      const s=scheds.find(x=>x.id===d.id);
      const full=s&&s.event==="축구"&&d.yes>=22;
      const cx=PL+gW*i+gW/2, isSel=sel===d.id;
      return h("g",{key:d.id,onClick:()=>onSel(d.id),style:{cursor:"pointer"}},
        isSel&&h("rect",{x:PL+gW*i+2,y:PT,width:gW-4,height:cH,fill:"rgba(49,130,246,0.07)",rx:6}),
        h("rect",{x:cx-bW-2,y:PT+ys(d.yes),width:bW,height:Math.max((d.yes/Math.max(maxVal,1))*cH,2),fill:full?"#3182f6":"#00b074",rx:4}),
        h("rect",{x:cx+2,y:PT+ys(d.no),width:bW,height:Math.max((d.no/Math.max(maxVal,1))*cH,2),fill:"#f45452",rx:4}),
        h("text",{x:cx,y:H-8,textAnchor:"middle",fontSize:10,fill:isSel?"#3182f6":"#bbb",fontWeight:isSel?"700":"400"},d.label)
      );
    })
  );
}

/* ── 메인 앱 ── */
function App(){
  const [ready,setReady]   = useState(false);
  const [dbErr,setDbErr]   = useState("");
  const [scheds,setScheds] = useState(DEF_SCHEDS);
  const [roster,setRoster] = useState([]);
  const [votes,setVotes]   = useState({});
  const [me,setMe]         = useState(()=>lsGet(LS_ME,null));
  const [step,setStep]     = useState(()=>lsGet(LS_ME,null)?"main":"reg");
  // step: reg | login | main
  const [form,setForm]     = useState({rank:"",serial:"",name:""});
  const [authErr,setAuthErr]= useState("");
  const [tab,setTab]       = useState("vote");
  const [dTab,setDTab]     = useState(null);
  const [aOpen,setAOpen]   = useState(false);
  const [pw,setPw]         = useState("");
  const [pwErr,setPwErr]   = useState(false);
  const [isAdmin,setIsAdmin]= useState(false);
  const [eScheds,setEScheds]= useState([]);
  const [aView,setAView]   = useState("schedules");

  /* Firebase 구독 */
  useEffect(()=>{
    const tid = setTimeout(()=>setDbErr("Firebase 연결 실패.\ndatabaseURL을 확인해 주세요:\n"+firebaseConfig.databaseURL), 10000);
    db.ref("scheds").on("value", snap=>{
      const v=snap.val();
      if(v) setScheds(Object.values(v));
      else  db.ref("scheds").set(Object.fromEntries(DEF_SCHEDS.map(s=>[s.id,s])));
      setReady(true); clearTimeout(tid);
    }, err=>{ setDbErr("오류: "+err.message); clearTimeout(tid); });
    db.ref("roster").on("value", snap=>{ const v=snap.val(); setRoster(v?Object.values(v):[]); });
    db.ref("votes").on("value",  snap=>{ setVotes(snap.val()||{}); });
    return ()=>{ db.ref("scheds").off(); db.ref("roster").off(); db.ref("votes").off(); };
  },[]);

  useEffect(()=>lsSet(LS_ME,me),[me]);

  /* 등록 */
  const doRegister=async()=>{
    const {rank,serial,name}=form;
    if(!rank.trim()||!serial.trim()||!name.trim()){setAuthErr("모든 항목을 입력해 주세요.");return;}
    if(roster.find(r=>r.rank===rank.trim()&&r.name===name.trim())){
      setAuthErr("이미 등록된 이름입니다.\n본인이라면 '본인 확인'으로 로그인해 주세요.");return;
    }
    const serialHash=await sha256(serial.trim());
    const m={id:Date.now(),rank:rank.trim(),serialHash,name:name.trim()};
    db.ref("roster/"+m.id).set(m);
    setMe({...m,serial:serial.trim()});
    setAuthErr(""); setStep("main"); setTab("vote");
  };

  /* 로그인 */
  const doLogin=async()=>{
    const {rank,serial,name}=form;
    if(!rank.trim()||!serial.trim()||!name.trim()){setAuthErr("모든 항목을 입력해 주세요.");return;}
    const serialHash=await sha256(serial.trim());
    const matched=roster.find(r=>r.rank===rank.trim()&&r.name===name.trim()&&(r.serialHash===serialHash||r.serial===serial.trim()));
    if(!matched){setAuthErr("등록된 정보와 일치하지 않습니다.");return;}
    setMe({...matched,serial:serial.trim()});
    setAuthErr(""); setStep("main"); setTab("vote");
  };

  /* 투표 */
  const castVote=(sid,val)=>{
    if(!me||scheds.find(s=>s.id===sid)&&scheds.find(s=>s.id===sid).closed)return;
    db.ref("votes/"+sid+"/"+me.id).set(val);
  };
  const getVote=sid=>(votes[sid]||{})[me&&me.id]??null;

  /* 통계 */
  const stats=scheds.map(s=>{
    const sv=votes[s.id]||{};
    return{id:s.id,label:s.date.slice(0,5),
      yes:roster.filter(m=>sv[m.id]==="yes").length,
      no:roster.filter(m=>sv[m.id]==="no").length};
  });
  const maxVal=Math.max(roster.length,1);
  const avg=roster.length?Math.round(stats.reduce((a,s)=>a+s.yes,0)/scheds.length):0;
  const safeTab=scheds.find(s=>s.id===dTab)?dTab:scheds[0]&&scheds[0].id;
  const selStat=stats.find(s=>s.id===safeTab);

  /* 관리자 */
  const openA=()=>{setAOpen(true);setPw("");setPwErr(false)};
  const closeA=()=>setAOpen(false);
  const submitPw=async()=>{
    const hash=await sha256(pw);
    if(hash===ADMIN_PW_HASH){setIsAdmin(true);setEScheds(scheds.map(s=>Object.assign({},s)));setPwErr(false);}
    else setPwErr(true);
  };
  const saveA=()=>{
    const ns=eScheds.filter(s=>s.date.trim());
    db.ref("scheds").set(Object.fromEntries(ns.map(s=>[s.id,s])));
    setAOpen(false);
  };

  /* 스타일 */
  const BB={padding:"12px 0",borderRadius:12,border:"none",background:"#3182f6",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"};
  const BG={padding:"12px 0",borderRadius:12,border:"1px solid rgba(0,0,0,0.1)",background:"#f5f6f8",color:"#555",fontSize:14,fontWeight:600,cursor:"pointer"};
  const chip=t=>({fontSize:13,padding:"4px 12px",borderRadius:20,background:t==="yes"?"#e6faf3":"#fff0f0",color:t==="yes"?"#00805a":"#d63031"});
  const pill=(a,t)=>({flex:1,padding:"9px 0",fontSize:14,fontWeight:a?600:400,background:a?(t==="yes"?"#00b074":"#f45452"):"#f5f6f8",color:a?"#fff":"#888",border:"none",borderRadius:10,cursor:"pointer"});
  const tb=k=>({flex:1,padding:"9px 0",fontSize:14,fontWeight:tab===k?700:400,background:tab===k?"#fff":"transparent",color:tab===k?"#3182f6":"#888",border:"none",borderRadius:11,cursor:"pointer",boxShadow:tab===k?"0 1px 4px rgba(0,0,0,0.08)":"none"});
  const atb=k=>({flex:1,padding:"8px 0",fontSize:13,fontWeight:aView===k?700:400,border:"none",borderRadius:10,cursor:"pointer",background:aView===k?"#3182f6":"#f5f6f8",color:aView===k?"#fff":"#888"});

  /* 오류 */
  if(dbErr) return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",padding:"2rem",textAlign:"center"}},
    h("p",{style:{fontSize:16,fontWeight:700,color:"#f45452",marginBottom:12}},"연결 오류"),
    h("p",{style:{fontSize:13,color:"#888",whiteSpace:"pre-line",lineHeight:1.8}},dbErr)
  );

  /* 로딩 */
  if(!ready) return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontSize:15,color:"#aaa"}},"불러오는 중...");

  /* 인증 화면 (reg / login) */
  if(step!=="main"){
    const isReg=step==="reg";
    return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"1.5rem"}},
      h("div",{style:{background:"#fff",borderRadius:24,padding:"32px 28px",width:"100%",maxWidth:400,boxShadow:"0 4px 24px rgba(0,0,0,0.07)"}},
        h("h1",{style:{fontSize:20,fontWeight:700,marginBottom:6}},"영외체련 인원조사"),
        h("p",{style:{fontSize:13,color:"#888",marginBottom:24,lineHeight:1.6}},
          isReg?"처음 방문이신가요? 기수·군번·이름을 입력해 주세요.<br>군번은 확인 용도로만 사용됩니다.":"등록하신 정보로 본인 확인을 해주세요."),
        ["rank","serial","name"].map((field,i)=>
          h("div",{key:field,style:{marginBottom:10}},
            h("label",{style:{fontSize:12,fontWeight:600,color:"#888",display:"block",marginBottom:5}},["기수","군번","이름"][i]),
            h("input",{className:"inp",type:"text",placeholder:field==="rank"?"예) 868":"",
              value:form[field],
              onChange:ev=>setForm(p=>Object.assign({},p,{[field]:ev.target.value})),
              onKeyDown:ev=>ev.key==="Enter"&&(isReg?doRegister():doLogin())})
          )
        ),
        authErr&&h("p",{style:{fontSize:13,color:"#f45452",marginBottom:12,whiteSpace:"pre-line"}},authErr),
        h("button",{onClick:isReg?doRegister:doLogin,style:Object.assign({},BB,{width:"100%",marginBottom:12})},isReg?"등록하기":"로그인"),
        h("button",{onClick:()=>{setAuthErr("");setForm({rank:"",serial:"",name:""});setStep(isReg?"login":"reg");},
          style:{width:"100%",background:"none",border:"none",fontSize:13,color:"#3182f6",cursor:"pointer",fontWeight:600}},
          isReg?"이미 등록하셨나요? 본인 확인":"처음 방문이신가요? 등록하기")
      )
    );
  }

  /* 메인 화면 */
  return h("div",{style:{padding:"1.5rem 1.25rem",maxWidth:640,margin:"0 auto"}},

    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.5rem"}},
      h("div",null,
        h("h1",{style:{fontSize:22,fontWeight:700,letterSpacing:"-0.5px"}},"영외체련 인원조사"),
        h("p",{style:{marginTop:5,fontSize:13,color:"#888",lineHeight:1.65}},
          "매월 2·4주 축구 고정 / 1·3주 타 종목 예정",h("br"),"투표 마감 : 전 주 일요일 오후 9시")
      ),
      h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}},
        h("button",{onClick:openA,style:{padding:"7px 14px",fontSize:13,fontWeight:600,borderRadius:10,background:isAdmin?"#3182f6":"#f5f6f8",color:isAdmin?"#fff":"#555",border:"1px solid rgba(0,0,0,0.1)",cursor:"pointer"}},isAdmin?"관리자 모드":"관리자"),
        h("div",{style:{display:"flex",alignItems:"center",gap:8}},
          h("span",{style:{fontSize:12,color:"#aaa"}},me.rank+"기 "+me.name),
          h("button",{onClick:()=>{setStep("login");setAuthErr("");setForm({rank:"",serial:"",name:""});},
            style:{fontSize:12,color:"#3182f6",background:"none",border:"none",cursor:"pointer",fontWeight:600,padding:0}},"로그아웃")
        )
      )
    ),

    h("div",{style:{display:"flex",marginBottom:"1.5rem",background:"#eef0f3",borderRadius:14,padding:4}},
      h("button",{style:tb("vote"),onClick:()=>setTab("vote")},"투표"),
      h("button",{style:tb("dashboard"),onClick:()=>setTab("dashboard")},"현황")
    ),

    /* 투표 탭 */
    tab==="vote"&&h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
      scheds.map(s=>{
        const v=getVote(s.id);
        return h("div",{key:s.id,className:"card"},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}},
            h("div",null,
              h("p",{style:{fontSize:15,fontWeight:700}},s.date),
              h("p",{style:{marginTop:4,fontSize:14,fontWeight:600,color:"#3182f6"}},"[ "+s.event+" ]")
            ),
            h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
              s.closed&&h("span",{style:{fontSize:12,fontWeight:600,padding:"3px 10px",borderRadius:20,background:"#f0f0f0",color:"#888"}},"마감"),
              v&&!s.closed&&h("span",{style:chip(v)},v==="yes"?"참석":"불참")
            )
          ),
          s.closed
            ? h("div",{style:{padding:"10px 14px",background:"#f5f6f8",borderRadius:10,fontSize:13,color:"#aaa",textAlign:"center"}},"투표가 마감되었습니다")
            : h("div",{style:{display:"flex",gap:8}},
                h("button",{style:pill(v==="yes","yes"),onClick:()=>castVote(s.id,"yes")},"참석"),
                h("button",{style:pill(v==="no","no"),onClick:()=>castVote(s.id,"no")},"불참")
              )
        );
      })
    ),

    /* 현황 탭 */
    tab==="dashboard"&&h("div",null,
      h("div",{style:{display:"flex",gap:10,marginBottom:12}},
        [{l:"등록 인원",v:roster.length+"명"},{l:"평균 참석",v:avg+"명"}].map(c=>
          h("div",{key:c.l,style:{background:"#f5f6f8",borderRadius:16,padding:"16px 18px",flex:1}},
            h("p",{style:{fontSize:12,color:"#888",fontWeight:600}},c.l),
            h("p",{style:{marginTop:6,fontSize:26,fontWeight:700,letterSpacing:"-0.5px"}},c.v)
          )
        )
      ),
      h("div",{className:"card"},
        h("p",{style:{marginBottom:10,fontSize:15,fontWeight:700}},"일정별 참석 인원"),
        h("div",{style:{display:"flex",gap:14,marginBottom:10,fontSize:12,color:"#888"}},
          h("span",{style:{display:"flex",alignItems:"center",gap:5}},h("span",{style:{width:10,height:10,borderRadius:3,background:"#00b074",display:"inline-block"}}),"참석"),
          h("span",{style:{display:"flex",alignItems:"center",gap:5}},h("span",{style:{width:10,height:10,borderRadius:3,background:"#3182f6",display:"inline-block"}}),"참석(인원충족)"),
          h("span",{style:{display:"flex",alignItems:"center",gap:5}},h("span",{style:{width:10,height:10,borderRadius:3,background:"#f45452",display:"inline-block"}}),"불참")
        ),
        h("p",{style:{fontSize:12,color:"#bbb",marginBottom:8}},"막대를 클릭하면 명단을 확인할 수 있어요"),
        h(BarChart,{data:stats,maxVal,scheds,sel:safeTab,onSel:setDTab}),
        stats.some(d=>{const s=scheds.find(x=>x.id===d.id);return s&&s.event==="축구"&&d.yes>=22})&&
          h("div",{style:{marginTop:10,padding:"8px 14px",background:"#e8f0fe",borderRadius:10,display:"flex",alignItems:"center",gap:8}},
            h("span",{style:{fontSize:13,color:"#1a56db",fontWeight:600}},"인원 충족"),
            h("span",{style:{fontSize:12,color:"#3d6fd4"}},"축구 22명 이상 참석 예정인 일정이 있습니다")
          )
      ),
      selStat&&(()=>{
        const s=scheds.find(x=>x.id===safeTab);
        if(!s)return null;
        const full=s.event==="축구"&&selStat.yes>=22;
        return h("div",{className:"card"},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
            h("div",null,
              h("p",{style:{fontSize:15,fontWeight:700}},s.date+" · "+s.event),
              h("div",{style:{display:"flex",gap:10,marginTop:4}},
                h("span",{style:{fontSize:13,color:"#00805a",fontWeight:600}},"참석 "+selStat.yes+"명"),
                h("span",{style:{fontSize:13,color:"#d63031",fontWeight:600}},"불참 "+selStat.no+"명"),
                h("span",{style:{fontSize:13,color:"#bbb"}},"미투표 "+(roster.length-selStat.yes-selStat.no)+"명")
              )
            ),
            h("div",{style:{display:"flex",gap:6}},
              s.closed&&h("span",{style:{fontSize:12,fontWeight:600,padding:"4px 10px",borderRadius:20,background:"#f0f0f0",color:"#888"}},"마감"),
              full&&h("span",{style:{fontSize:12,fontWeight:700,padding:"4px 10px",borderRadius:20,background:"#e8f0fe",color:"#1a56db"}},"인원 충족")
            )
          ),
          h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
            roster.map(m=>{
              const v=(votes[safeTab]||{})[m.id]||null;
              return h("div",{key:m.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#f5f6f8",borderRadius:12}},
                h("div",{style:{display:"flex",alignItems:"center",gap:10}},
                  h("div",{style:{width:34,height:34,borderRadius:"50%",background:"#e8f0fe",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#3182f6",flexShrink:0}},(m.name||"?")[0]),
                  h("div",null,
                    h("p",{style:{fontSize:14,fontWeight:600}},m.name),
                    m.rank&&h("p",{style:{fontSize:12,color:"#888"}},m.rank+"기")
                  )
                ),
                h("span",{style:v?chip(v):{fontSize:13,color:"#bbb"}},v==="yes"?"참석":v==="no"?"불참":"미투표")
              );
            })
          )
        );
      })()
    ),

    /* 관리자 모달 */
    aOpen&&h("div",{className:"overlay",onClick:ev=>{if(ev.target===ev.currentTarget)closeA()}},
      h("div",{className:"mbox"},
        !isAdmin
          ? h("div",null,
              h("p",{style:{marginBottom:20,fontSize:18,fontWeight:700}},"관리자 로그인"),
              h("input",{type:"password",className:"inp",placeholder:"비밀번호 입력",value:pw,
                onChange:ev=>setPw(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&submitPw(),
                style:{marginBottom:8,borderColor:pwErr?"#f45452":""}}),
              pwErr&&h("p",{style:{marginBottom:12,fontSize:13,color:"#f45452"}},"비밀번호가 올바르지 않습니다"),
              h("div",{style:{display:"flex",gap:8}},
                h("button",{onClick:closeA,style:Object.assign({},BG,{flex:1})},"취소"),
                h("button",{onClick:submitPw,style:Object.assign({},BB,{flex:1})},"확인")
              )
            )
          : h("div",null,
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
                h("p",{style:{fontSize:18,fontWeight:700}},"관리자 설정"),
                h("button",{onClick:()=>{setIsAdmin(false);setAOpen(false);},style:{fontSize:13,color:"#f45452",background:"none",border:"none",cursor:"pointer",fontWeight:600}},"로그아웃")
              ),
              h("div",{style:{display:"flex",gap:6,marginBottom:18}},
                h("button",{style:atb("schedules"),onClick:()=>setAView("schedules")},"일정 관리"),
                h("button",{style:atb("votes"),onClick:()=>setAView("votes")},"투표 마감")
              ),
              aView==="schedules"&&h("div",null,
                h("div",{style:{display:"flex",gap:6,marginBottom:8,paddingBottom:8,borderBottom:"1px solid #eee"}},
                  h("span",{style:{fontSize:12,fontWeight:600,color:"#888",flex:1}},"날짜"),
                  h("span",{style:{fontSize:12,fontWeight:600,color:"#888",flex:1}},"종목"),
                  h("span",{style:{width:32}})
                ),
                h("div",{style:{display:"flex",flexDirection:"column",gap:8,marginBottom:12}},
                  eScheds.map(s=>h("div",{key:s.id,style:{display:"flex",gap:6,alignItems:"center"}},
                    h("input",{className:"inp",placeholder:"3월 20일 (금)",value:s.date,style:{flex:1,fontSize:13},
                      onChange:ev=>setEScheds(p=>p.map(x=>x.id===s.id?Object.assign({},x,{date:ev.target.value}):x))}),
                    h("input",{className:"inp",placeholder:"종목",value:s.event,style:{flex:1,fontSize:13},
                      onChange:ev=>setEScheds(p=>p.map(x=>x.id===s.id?Object.assign({},x,{event:ev.target.value}):x))}),
                    h("button",{onClick:()=>setEScheds(p=>p.filter(x=>x.id!==s.id)),
                      style:{width:32,height:36,borderRadius:8,border:"1px solid #e0e0e0",background:"#f5f6f8",color:"#888",cursor:"pointer",fontSize:16}},"×")
                  ))
                ),
                h("button",{onClick:()=>setEScheds(p=>[...p,{id:Date.now(),date:"",event:"",closed:false}]),
                  style:{width:"100%",padding:"10px 0",borderRadius:12,border:"1.5px dashed #c0c8d8",background:"transparent",color:"#3182f6",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:10}},"+ 일정 추가"),
                h("div",{style:{display:"flex",gap:8}},
                  h("button",{onClick:closeA,style:Object.assign({},BG,{flex:1})},"취소"),
                  h("button",{onClick:saveA,style:Object.assign({},BB,{flex:1})},"저장")
                )
              ),
              aView==="votes"&&h("div",null,
                h("p",{style:{marginBottom:12,fontSize:13,color:"#888"}},"일정별로 투표를 마감하거나 다시 열 수 있어요"),
                h("div",{style:{display:"flex",flexDirection:"column",gap:8,marginBottom:16}},
                  eScheds.map(s=>h("div",{key:s.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:"#f5f6f8",borderRadius:14}},
                    h("div",null,
                      h("p",{style:{fontSize:14,fontWeight:600}},s.date||"날짜 미설정"),
                      h("p",{style:{marginTop:2,fontSize:12,color:"#888"}},s.event||"종목 미설정")
                    ),
                    h("button",{onClick:()=>setEScheds(p=>p.map(x=>x.id===s.id?Object.assign({},x,{closed:!x.closed}):x)),
                      style:{padding:"7px 14px",fontSize:13,fontWeight:600,borderRadius:10,border:"none",cursor:"pointer",
                        background:s.closed?"#e6faf3":"#fff0f0",color:s.closed?"#00805a":"#f45452"}},s.closed?"열기":"마감")
                  ))
                ),
                h("div",{style:{display:"flex",gap:8}},
                  h("button",{onClick:closeA,style:Object.assign({},BG,{flex:1})},"취소"),
                  h("button",{onClick:saveA,style:Object.assign({},BB,{flex:1})},"저장")
                )
              )
            )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
