<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>영외체련 인원조사</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6f8;color:#191919;min-height:100vh}
input,select,button{font-family:inherit}
input:focus,select:focus{border-color:#3182f6!important;outline:none}
.card{background:#fff;border-radius:20px;border:1px solid rgba(0,0,0,0.07);padding:20px;margin-bottom:12px}
.inp{width:100%;padding:10px 14px;font-size:14px;border-radius:12px;border:1.5px solid rgba(0,0,0,0.12);background:#fff;color:#191919;outline:none}
.inp:disabled{background:#f5f6f8;color:#999}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal-box{background:#fff;border-radius:24px;padding:28px 24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState, useMemo, useEffect, createElement: h} = React;
const {BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer} = Recharts;

const ADMIN_PW = "0124";
const LS_KEY = "exercise_data_v2";

const defaultSchedules = [
  {id:1,date:"3월 20일 (금)",event:"축구",closed:false},
  {id:2,date:"4월 3일 (금)",event:"축구",closed:false},
  {id:3,date:"4월 17일 (금)",event:"배구",closed:false},
  {id:4,date:"5월 1일 (금)",event:"축구",closed:false},
  {id:5,date:"5월 15일 (금)",event:"족구",closed:false},
];

function loadState(){try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):null}catch{return null}}
function saveState(s){try{localStorage.setItem(LS_KEY,JSON.stringify(s))}catch{}}

function App(){
  const saved = loadState();
  const [tab,setTab]             = useState("members");
  const [schedules,setSchedules] = useState(saved?.schedules||defaultSchedules);
  const [members,setMembers]     = useState(saved?.members||[{id:1,rank:"",name:""}]);
  const [confirmed,setConfirmed] = useState(saved?.confirmed||false);
  const [votes,setVotes]         = useState(saved?.votes||{});
  const [myId,setMyId]           = useState("");
  const [schedTab,setSchedTab]   = useState(null);
  const [adminOpen,setAdminOpen] = useState(false);
  const [pwInput,setPwInput]     = useState("");
  const [pwError,setPwError]     = useState(false);
  const [isAdmin,setIsAdmin]     = useState(false);
  const [editScheds,setEditScheds] = useState([]);
  const [adminView,setAdminView] = useState("schedules");

  const validMembers = members.filter(m=>m.name.trim());

  const safeSchedTab = useMemo(()=>{
    if(schedules.find(s=>s.id===schedTab)) return schedTab;
    return schedules[0]?.id??null;
  },[schedTab,schedules]);

  useEffect(()=>{saveState({schedules,members,confirmed,votes})},[schedules,members,confirmed,votes]);

  const addMember    = ()=>setMembers(p=>[...p,{id:Date.now(),rank:"",name:""}]);
  const removeMember = id=>{if(!confirmed)setMembers(p=>p.filter(m=>m.id!==id))};
  const updateMember = (id,field,val)=>{if(!confirmed)setMembers(p=>p.map(m=>m.id===id?{...m,[field]:val}:m))};
  const handleConfirm= ()=>{if(validMembers.length===0)return;setConfirmed(true);setTab("vote")};
  const handleEdit   = ()=>{setConfirmed(false);setMyId("")};

  const castVote = (schedId,memberId,val)=>{
    if(schedules.find(s=>s.id===schedId)?.closed)return;
    setVotes(p=>({...p,[schedId]:{...(p[schedId]||{}),[memberId]:val}}));
  };
  const getVote    = (schedId,memberId)=>(votes[schedId]||{})[memberId]??null;
  const totalVoted = schedId=>{const sv=votes[schedId]||{};return validMembers.filter(m=>sv[m.id]!=null).length};

  const stats = useMemo(()=>schedules.map(s=>{
    const sv=votes[s.id]||{};
    return{
      label:s.date.slice(0,5),
      fullLabel:s.date+" · "+s.event,
      yes:validMembers.filter(m=>sv[m.id]==="yes").length,
      no:validMembers.filter(m=>sv[m.id]==="no").length,
      id:s.id
    };
  }),[votes,validMembers,schedules]);

  const avgAttend = validMembers.length>0?Math.round(stats.reduce((a,s)=>a+s.yes,0)/schedules.length):0;

  const openAdmin  = ()=>{setAdminOpen(true);setPwInput("");setPwError(false)};
  const closeAdmin = ()=>setAdminOpen(false);
  const submitPw   = ()=>{
    if(pwInput===ADMIN_PW){setIsAdmin(true);setEditScheds(schedules.map(s=>({...s})));setPwError(false)}
    else setPwError(true);
  };
  const logoutAdmin = ()=>{setIsAdmin(false);setAdminOpen(false)};
  const updateES  = (id,field,val)=>setEditScheds(p=>p.map(s=>s.id===id?{...s,[field]:val}:s));
  const addSched  = ()=>setEditScheds(p=>[...p,{id:Date.now(),date:"",event:"",closed:false}]);
  const removeES  = id=>setEditScheds(p=>p.filter(s=>s.id!==id));
  const toggleClose=(id)=>setEditScheds(p=>p.map(s=>s.id===id?{...s,closed:!s.closed}:s));
  const saveScheds= ()=>{
    const next=editScheds.filter(s=>s.date.trim());
    setSchedules(next);setSchedTab(next[0]?.id??null);setAdminOpen(false);
  };

  // ── style helpers ──
  const tabBtnStyle = key=>({
    flex:1,padding:"9px 0",fontSize:14,fontWeight:tab===key?700:400,
    background:tab===key?"#fff":"transparent",
    color:tab===key?"#3182f6":"#888",
    border:"none",borderRadius:11,cursor:"pointer",
    boxShadow:tab===key?"0 1px 4px rgba(0,0,0,0.08)":"none"
  });
  const pillStyle = (active,type)=>({
    flex:1,padding:"9px 0",fontSize:14,fontWeight:active?600:400,
    background:active?(type==="yes"?"#00b074":"#f45452"):"#f5f6f8",
    color:active?"#fff":"#888",border:"none",borderRadius:10,cursor:"pointer"
  });
  const chipStyle = type=>({
    fontSize:13,padding:"4px 12px",borderRadius:20,
    background:type==="yes"?"#e6faf3":"#fff0f0",
    color:type==="yes"?"#00805a":"#d63031"
  });
  const adminTabStyle = key=>({
    flex:1,padding:"8px 0",fontSize:13,fontWeight:adminView===key?700:400,
    border:"none",borderRadius:10,cursor:"pointer",
    background:adminView===key?"#3182f6":"#f5f6f8",
    color:adminView===key?"#fff":"#888"
  });

  // ── render ──
  return h("div",{style:{padding:"1.5rem 1.25rem",maxWidth:640,margin:"0 auto"}},

    // Header
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"2rem"}},
      h("div",null,
        h("h1",{style:{fontSize:22,fontWeight:700,letterSpacing:"-0.5px"}},"영외체련 인원조사"),
        h("p",{style:{marginTop:5,fontSize:13,color:"#888",lineHeight:1.65},
          dangerouslySetInnerHTML:{__html:"매월 2·4주 축구 고정 / 1·3주 타 종목 예정<br>투표 마감 : 전 주 일요일 오후 9시"}})
      ),
      h("button",{onClick:openAdmin,style:{
        padding:"7px 14px",fontSize:13,fontWeight:600,borderRadius:10,flexShrink:0,
        background:isAdmin?"#3182f6":"#f5f6f8",color:isAdmin?"#fff":"#555",
        border:"1px solid rgba(0,0,0,0.1)",cursor:"pointer"
      }},isAdmin?"관리자 모드":"관리자")
    ),

    // Tabs
    h("div",{style:{display:"flex",marginBottom:"1.5rem",background:"#eef0f3",borderRadius:14,padding:4}},
      ["members","vote","dashboard"].map((k,i)=>
        h("button",{key:k,onClick:()=>setTab(k),style:tabBtnStyle(k)},["인원 관리","투표","현황"][i])
      )
    ),

    // ── 인원 관리 ──
    tab==="members" && h("div",{className:"card"},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        h("span",{style:{fontSize:16,fontWeight:700}},"인원 명단"),
        h("span",{style:{fontSize:13,color:"#888"}},validMembers.length+"명")
      ),
      confirmed && h("div",{style:{marginBottom:14,padding:"10px 14px",background:"#e6faf3",borderRadius:12,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("span",{style:{fontSize:13,color:"#00805a",fontWeight:600}},"명단이 확인되었습니다"),
        h("button",{onClick:handleEdit,style:{fontSize:13,color:"#3182f6",background:"none",border:"none",cursor:"pointer",fontWeight:600}},"수정하기")
      ),
      h("div",{style:{display:"flex",gap:8,marginBottom:10,paddingBottom:8,borderBottom:"1px solid #eee"}},
        h("span",{style:{fontSize:12,color:"#888",width:72,fontWeight:600}},"기수"),
        h("span",{style:{fontSize:12,color:"#888",flex:1,fontWeight:600}},"이름"),
        !confirmed && h("span",{style:{width:32}})
      ),
      h("div",{style:{display:"flex",flexDirection:"column",gap:8,marginBottom:14}},
        members.map(m=>
          h("div",{key:m.id,style:{display:"flex",gap:8,alignItems:"center"}},
            h("input",{className:"inp",placeholder:"기수",value:m.rank,disabled:confirmed,
              onChange:e=>updateMember(m.id,"rank",e.target.value),
              style:{width:72,flexShrink:0}}),
            h("input",{className:"inp",placeholder:"이름",value:m.name,disabled:confirmed,
              onChange:e=>updateMember(m.id,"name",e.target.value),
              style:{flex:1}}),
            !confirmed && h("button",{onClick:()=>removeMember(m.id),
              style:{width:32,height:38,borderRadius:10,border:"1px solid #e0e0e0",background:"#f5f6f8",color:"#888",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}},"×")
          )
        )
      ),
      !confirmed && h("button",{onClick:addMember,
        style:{width:"100%",padding:"11px 0",borderRadius:12,border:"1.5px dashed #c0c8d8",background:"transparent",color:"#3182f6",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:10}},
        "+ 인원 추가"),
      !confirmed && h("button",{onClick:handleConfirm,disabled:validMembers.length===0,
        style:{width:"100%",padding:"13px 0",borderRadius:14,border:"none",
          background:validMembers.length>0?"#3182f6":"#e5e8eb",
          color:validMembers.length>0?"#fff":"#aaa",fontSize:15,fontWeight:700,
          cursor:validMembers.length>0?"pointer":"default"}},
        "확인")
    ),

    // ── 투표 ──
    tab==="vote" && h("div",null,
      !confirmed
        ? h("div",{className:"card",style:{textAlign:"center",padding:"2.5rem",color:"#888",fontSize:14}},
            "인원 관리 탭에서 명단을 입력하고 확인해 주세요")
        : h("div",null,
            h("div",{className:"card",style:{marginBottom:16}},
              h("label",{style:{fontSize:12,fontWeight:600,color:"#888",display:"block",marginBottom:8}},"이름 선택"),
              h("select",{value:myId,onChange:e=>setMyId(e.target.value),
                style:{width:"100%",padding:"11px 14px",fontSize:15,borderRadius:12,border:"1.5px solid rgba(0,0,0,0.12)",background:"#fff",color:"#191919",outline:"none"}},
                h("option",{value:""},"-- 이름을 선택하세요 --"),
                validMembers.map(m=>h("option",{key:m.id,value:m.id},(m.rank?"["+m.rank+"기] ":"")+m.name))
              )
            ),
            myId
              ? h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
                  schedules.map(s=>{
                    const v=getVote(s.id,myId);
                    return h("div",{key:s.id,className:"card"},
                      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}},
                        h("div",null,
                          h("p",{style:{fontSize:15,fontWeight:700}},s.date),
                          h("p",{style:{marginTop:3,fontSize:13,color:"#888"}},s.event)
                        ),
                        h("div",{style:{display:"flex",gap:6}},
                          s.closed && h("span",{style:{fontSize:12,fontWeight:600,padding:"3px 10px",borderRadius:20,background:"#f0f0f0",color:"#888"}},"마감"),
                          v&&!s.closed && h("span",{style:chipStyle(v)},v==="yes"?"참석":"불참")
                        )
                      ),
                      s.closed
                        ? h("div",{style:{padding:"10px 14px",background:"#f5f6f8",borderRadius:10,fontSize:13,color:"#aaa",textAlign:"center"}},"투표가 마감되었습니다")
                        : h("div",{style:{display:"flex",gap:8}},
                            h("button",{style:pillStyle(v==="yes","yes"),onClick:()=>castVote(s.id,myId,"yes")},"참석"),
                            h("button",{style:pillStyle(v==="no","no"),onClick:()=>castVote(s.id,myId,"no")},"불참")
                          )
                    );
                  })
                )
              : h("div",{style:{textAlign:"center",padding:"2rem 0",color:"#bbb",fontSize:14}},"이름을 선택하면 투표를 시작할 수 있어요")
          )
    ),

    // ── 현황 ──
    tab==="dashboard" && h("div",null,
      h("div",{style:{display:"flex",gap:10,marginBottom:12}},
        [{label:"등록 인원",val:validMembers.length+"명"},{label:"평균 참석",val:avgAttend+"명"}].map(c=>
          h("div",{key:c.label,style:{background:"#f5f6f8",borderRadius:16,padding:"16px 18px",flex:1}},
            h("p",{style:{fontSize:12,color:"#888",fontWeight:600}},c.label),
            h("p",{style:{marginTop:6,fontSize:26,fontWeight:700,letterSpacing:"-0.5px"}},c.val)
          )
        )
      ),
      h("div",{className:"card"},
        h("p",{style:{marginBottom:10,fontSize:15,fontWeight:700}},"일정별 참석 인원"),
        h("div",{style:{display:"flex",gap:14,marginBottom:12,fontSize:12,color:"#888"}},
          h("span",{style:{display:"flex",alignItems:"center",gap:5}},h("span",{style:{width:10,height:10,borderRadius:3,background:"#00b074",display:"inline-block"}}),"참석"),
          h("span",{style:{display:"flex",alignItems:"center",gap:5}},h("span",{style:{width:10,height:10,borderRadius:3,background:"#f45452",display:"inline-block"}}),"불참")
        ),
        h("div",{style:{height:220}},
          h(ResponsiveContainer,{width:"100%",height:"100%"},
            h(BarChart,{data:stats,barGap:3,barCategoryGap:"30%"},
              h(CartesianGrid,{strokeDasharray:"3 3",stroke:"rgba(0,0,0,0.05)",vertical:false}),
              h(XAxis,{dataKey:"label",tick:{fontSize:12,fill:"#aaa"},axisLine:false,tickLine:false}),
              h(YAxis,{tick:{fontSize:12,fill:"#aaa"},axisLine:false,tickLine:false,domain:[0,Math.max(validMembers.length,1)]}),
              h(Tooltip,{formatter:(v,n)=>[v+"명",n==="yes"?"참석":"불참"],
                labelFormatter:l=>stats.find(s=>s.label===l)?.fullLabel||l,
                contentStyle:{fontSize:13,borderRadius:12,border:"1px solid #eee"}}),
              h(Bar,{dataKey:"yes",name:"yes",fill:"#00b074",radius:[6,6,0,0],maxBarSize:40}),
              h(Bar,{dataKey:"no",name:"no",fill:"#f45452",radius:[6,6,0,0],maxBarSize:40})
            )
          )
        )
      ),
      h("div",{className:"card"},
        h("p",{style:{marginBottom:14,fontSize:15,fontWeight:700}},"일정별 명단"),
        h("div",{style:{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}},
          schedules.map(s=>
            h("button",{key:s.id,onClick:()=>setSchedTab(s.id),style:{
              padding:"6px 14px",fontSize:13,borderRadius:20,border:"none",cursor:"pointer",
              fontWeight:safeSchedTab===s.id?600:400,
              background:safeSchedTab===s.id?"#3182f6":"#f5f6f8",
              color:safeSchedTab===s.id?"#fff":"#888"
            }},s.date.slice(0,5))
          )
        ),
        (()=>{
          const sched=schedules.find(s=>s.id===safeSchedTab);
          if(!sched)return h("p",{style:{fontSize:13,color:"#bbb"}},"일정이 없습니다");
          return h("div",null,
            h("div",{style:{marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}},
              h("div",null,
                h("p",{style:{fontSize:14,fontWeight:700}},sched.date+" · "+sched.event),
                h("p",{style:{marginTop:2,fontSize:13,color:"#888"}},totalVoted(safeSchedTab)+"/"+validMembers.length+"명 투표 완료")
              ),
              sched.closed && h("span",{style:{fontSize:12,fontWeight:600,padding:"4px 12px",borderRadius:20,background:"#f0f0f0",color:"#888"}},"마감됨")
            ),
            validMembers.length===0
              ? h("p",{style:{fontSize:13,color:"#bbb"}},"등록된 인원이 없습니다")
              : h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
                  validMembers.map(m=>{
                    const v=getVote(safeSchedTab,m.id);
                    return h("div",{key:m.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#f5f6f8",borderRadius:12}},
                      h("div",{style:{display:"flex",alignItems:"center",gap:10}},
                        h("div",{style:{width:34,height:34,borderRadius:"50%",background:"#e8f0fe",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#3182f6",flexShrink:0}},(m.name||"?")[0]),
                        h("div",null,
                          h("p",{style:{fontSize:14,fontWeight:600}},m.name),
                          m.rank&&h("p",{style:{fontSize:12,color:"#888"}},m.rank+"기")
                        )
                      ),
                      h("span",{style:v?chipStyle(v):{fontSize:13,color:"#bbb"}},v==="yes"?"참석":v==="no"?"불참":"미투표")
                    );
                  })
                )
          );
        })()
      )
    ),

    // ── 관리자 모달 ──
    adminOpen && h("div",{className:"modal-overlay",onClick:e=>{if(e.target===e.currentTarget)closeAdmin()}},
      h("div",{className:"modal-box"},
        !isAdmin
          ? h("div",null,
              h("p",{style:{marginBottom:20,fontSize:18,fontWeight:700}},"관리자 로그인"),
              h("input",{type:"password",className:"inp",placeholder:"비밀번호 입력",value:pwInput,
                onChange:e=>setPwInput(e.target.value),
                onKeyDown:e=>e.key==="Enter"&&submitPw(),
                style:{marginBottom:8,border:"1.5px solid "+(pwError?"#f45452":"rgba(0,0,0,0.12)")}}),
              pwError&&h("p",{style:{marginBottom:12,fontSize:13,color:"#f45452"}},"비밀번호가 올바르지 않습니다"),
              h("div",{style:{display:"flex",gap:8}},
                h("button",{onClick:closeAdmin,style:{flex:1,padding:"12px 0",borderRadius:12,border:"1px solid rgba(0,0,0,0.1)",background:"#f5f6f8",color:"#555",fontSize:14,fontWeight:600,cursor:"pointer"}},"취소"),
                h("button",{onClick:submitPw,style:{flex:1,padding:"12px 0",borderRadius:12,border:"none",background:"#3182f6",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}},"확인")
              )
            )
          : h("div",null,
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
                h("p",{style:{fontSize:18,fontWeight:700}},"관리자 설정"),
                h("button",{onClick:logoutAdmin,style:{fontSize:13,color:"#f45452",background:"none",border:"none",cursor:"pointer",fontWeight:600}},"로그아웃")
              ),
              h("div",{style:{display:"flex",gap:6,marginBottom:18}},
                ["schedules","votes"].map((k,i)=>
                  h("button",{key:k,onClick:()=>setAdminView(k),style:adminTabStyle(k)},["일정 관리","투표 마감"][i])
                )
              ),
              adminView==="schedules" && h("div",null,
                h("div",{style:{display:"flex",gap:6,marginBottom:8,paddingBottom:8,borderBottom:"1px solid #eee"}},
                  h("span",{style:{fontSize:12,fontWeight:600,color:"#888",flex:1}},"날짜"),
                  h("span",{style:{fontSize:12,fontWeight:600,color:"#888",flex:1}},"종목"),
                  h("span",{style:{width:32}})
                ),
                h("div",{style:{display:"flex",flexDirection:"column",gap:8,marginBottom:12}},
                  editScheds.map(s=>
                    h("div",{key:s.id,style:{display:"flex",gap:6,alignItems:"center"}},
                      h("input",{className:"inp",placeholder:"3월 20일 (금)",value:s.date,
                        onChange:e=>updateES(s.id,"date",e.target.value),style:{flex:1,fontSize:13}}),
                      h("input",{className:"inp",placeholder:"종목",value:s.event,
                        onChange:e=>updateES(s.id,"event",e.target.value),style:{flex:1,fontSize:13}}),
                      h("button",{onClick:()=>removeES(s.id),
                        style:{width:32,height:36,borderRadius:8,border:"1px solid #e0e0e0",background:"#f5f6f8",color:"#888",cursor:"pointer",fontSize:16}},"×")
                    )
                  )
                ),
                h("button",{onClick:addSched,style:{width:"100%",padding:"10px 0",borderRadius:12,border:"1.5px dashed #c0c8d8",background:"transparent",color:"#3182f6",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:10}},"+ 일정 추가"),
                h("div",{style:{display:"flex",gap:8}},
                  h("button",{onClick:closeAdmin,style:{flex:1,padding:"12px 0",borderRadius:12,border:"1px solid rgba(0,0,0,0.1)",background:"#f5f6f8",color:"#555",fontSize:14,fontWeight:600,cursor:"pointer"}},"취소"),
                  h("button",{onClick:saveScheds,style:{flex:1,padding:"12px 0",borderRadius:12,border:"none",background:"#3182f6",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}},"저장")
                )
              ),
              adminView==="votes" && h("div",null,
                h("p",{style:{marginBottom:12,fontSize:13,color:"#888"}},"일정별로 투표를 마감하거나 다시 열 수 있어요"),
                h("div",{style:{display:"flex",flexDirection:"column",gap:8,marginBottom:16}},
                  editScheds.map(s=>
                    h("div",{key:s.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:"#f5f6f8",borderRadius:14}},
                      h("div",null,
                        h("p",{style:{fontSize:14,fontWeight:600}},s.date||"날짜 미설정"),
                        h("p",{style:{marginTop:2,fontSize:12,color:"#888"}},s.event||"종목 미설정")
                      ),
                      h("button",{onClick:()=>toggleClose(s.id),style:{
                        padding:"7px 14px",fontSize:13,fontWeight:600,borderRadius:10,border:"none",cursor:"pointer",
                        background:s.closed?"#e6faf3":"#fff0f0",color:s.closed?"#00805a":"#f45452"
                      }},s.closed?"열기":"마감")
                    )
                  )
                ),
                h("div",{style:{display:"flex",gap:8}},
                  h("button",{onClick:closeAdmin,style:{flex:1,padding:"12px 0",borderRadius:12,border:"1px solid rgba(0,0,0,0.1)",background:"#f5f6f8",color:"#555",fontSize:14,fontWeight:600,cursor:"pointer"}},"취소"),
                  h("button",{onClick:saveScheds,style:{flex:1,padding:"12px 0",borderRadius:12,border:"none",background:"#3182f6",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}},"저장")
                )
              )
            )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
